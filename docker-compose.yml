services:
  redis:
    image: redis:7-alpine
    container_name: fl-psi-redis
    ports:
      # host:container — override the host port if 6379 is taken: REDIS_PORT=6381
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: fl-psi-redisinsight
    ports:
      # web UI; override the host port if 5540 is taken: REDISINSIGHT_PORT=5541
      - "${REDISINSIGHT_PORT:-5540}:5540"
    environment:
      # auto-add the fl-psi redis as a database on first start (same compose network,
      # so it reaches redis by its service name on the internal port 6379)
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: fl-psi
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - redisinsight-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  redisinsight-data:
